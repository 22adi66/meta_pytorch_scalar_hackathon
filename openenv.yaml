spec_version: 1
name: crust_env
display_name: "CRust — C-to-Rust Migration RL Environment"
type: space
runtime: fastapi
app: crust_env.api:app
port: 8000

description: >
  An OpenEnv-compatible reinforcement learning environment that trains LLMs
  to migrate legacy C codebases to memory-safe, idiomatic Rust.
  Features topological dependency scheduling, multi-constraint instruction
  following, and verifiable multi-objective rewards via cargo check + cargo test.

theme: "Super Long-Horizon Planning & Instruction Following"
hackathon: "Meta PyTorch OpenEnv Hackathon 2026"

actions:
  - name: reset
    description: "Start a new migration episode. Returns the first C file to translate."
    endpoint: POST /reset
  - name: step
    description: "Submit a Rust translation. Runs cargo check, cargo test, and metric evaluation."
    endpoint: POST /step
  - name: state
    description: "Full internal state (session, schedule, history)."
    endpoint: GET /state
  - name: observation
    description: "Agent-visible partial observation (C source, constraints, errors)."
    endpoint: GET /observation

reward:
  min: 0.01
  max: 0.99
  components:
    - name: compilation
      weight: 0.30
      description: "cargo check passes — structural correctness"
    - name: tests
      weight: 0.30
      description: "cargo test passes — semantic equivalence to C original"
    - name: memory_safety
      weight: 0.20
      description: >
        5-family LAC2R safety score S(r) = m * max(1 - T_i/T_0, 0)
        where T_i = RPC+RPR+LUC+UCE+UTC (paper Eq. 3, Sim et al. arXiv:2505.15858).
        Families: RPC (raw ptr creations), RPR (raw ptr references),
        LUC (lines in unsafe blocks), UCE (extern C/FFI calls),
        UTC (mem::transmute / as *const T casts).
        Continuous [0,1] signal — agent rewarded for progressively
        eliminating each unsafe family, not just binary presence.
    - name: cbo
      weight: 0.10
      description: "Coupling Between Objects < 3 — loosely coupled modules"
    - name: cohesion
      weight: 0.10
      description: "LCOM cohesion score — all methods touch shared fields"
  penalties:
    - name: unsafe_penalty
      value: -0.50
      description: "Fires when 'Do not use the unsafe keyword' constraint is active AND any unsafe constructs detected"
    - name: cbo_penalty
      value: -0.20
      description: "Fires when 'Maintain a CBO score below 3' constraint is active AND CBO >= 3"
  process_supervision:
    - name: error_cleared_bonus
      value: +0.02
      description: "Per compiler error cleared vs. previous step (shapes dense reward)"

curriculum:
  phases: 4
  phase_1: "Single leaf-node file (isolated functions)"
  phase_2: "Two-file dependency chain"
  phase_3: "Partial DAG with cross-file headers"
  phase_4: "Full repository (long-horizon cascading error resolution)"

space_url: "https://adithyakommuri-meta-hackathon-final.hf.space"
model_url: "https://huggingface.co/Adithyakommuri/crust-grpo-qwen25-3b"
